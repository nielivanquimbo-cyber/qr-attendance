<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 30px;
    }

    #reader {
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
let html5QrCode;

const SCRIPT_URL = "PASTE_YOUR_URL_HERE";

let scanLock = {};
let SESSION = new Date().toDateString();

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      let now = new Date().toLocaleString();
      let studentId = decodedText.trim();

      // 🛡️ prevent rapid repeat scan
      if (scanLock[studentId]) {
        let diff = (new Date() - scanLock[studentId]) / 1000;
        if (diff < 5) return;
      }

      scanLock[studentId] = new Date();

      document.getElementById("result").innerHTML =
        "Scanned: <b>" + studentId + "</b><br>" + now;

      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          qr: studentId,
          time: now,
          session: SESSION
        })
      });

    }
  );
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear());
  }
}
</script>

</body>
</html>
