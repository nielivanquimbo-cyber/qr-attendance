<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 30px;
    }

    #reader {
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
let html5QrCode;

// 🔴 Change this if needed
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4j_4jYNPX0pdeTgxeEgVfi4Ph8ULjwynMNApyQdKG3OryHm8l3jjYR3EP4vnLisyW2w/exec";

// 🛡️ Teacher-proof storage
let scanCooldown = {};
let SESSION_ID = new Date().toDateString(); // resets daily

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      let now = new Date();
      let time = now.toLocaleString();

      let studentId = decodedText.trim();

      // 🛡️ RULE 1: prevent spam scanning (per student)
      if (scanCooldown[studentId]) {
        let lastTime = scanCooldown[studentId];
        let diff = (now - lastTime) / 1000;

        // ignore if scanned within 5 seconds
        if (diff < 5) return;
      }

      scanCooldown[studentId] = now;

      // 🛡️ RULE 2: show on screen
      document.getElementById("result").innerHTML =
        "Scanned: <b>" + studentId + "</b><br>" + time;

      // 🛡️ RULE 3: send to Google Sheets
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          qr: studentId,
          time: time,
          session: SESSION_ID
        })
      })
      .then(res => res.text())
      .then(data => console.log(data))
      .catch(err => console.error(err));

    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear());
  }
}
</script>

</body>
</html>
