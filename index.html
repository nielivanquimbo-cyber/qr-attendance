<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 30px;
    }

    #reader {
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>QR Attendance Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
let scanLock = false;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4j_4jYNPX0pdeTgxeEgVfi4Ph8ULjwynMNApyQdKG3OryHm8l3jjYR3EP4vnLisyW2w/exec";

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    (decodedText) => {

      // 🚫 BLOCK DUPLICATE SCANS
      if (scanLock) return;

      scanLock = true;

      const now = new Date().toLocaleString();

      document.getElementById("result").innerHTML =
        "Scanned: " + decodedText + "<br>" + now;

      // Send to Google Sheets
      fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify({
          name: "Student",
          qr: decodedText,
          time: now
        })
      })
      .then(res => res.text())
      .then(data => console.log(data))
      .catch(err => console.error(err));

      // ⏱️ Unlock after 3 seconds
      setTimeout(() => {
        scanLock = false;
      }, 3000);

    }
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear());
  }
}
</script>

</body>
</html>
