<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance Scanner</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin-top: 30px;
    }

    #reader {
      width: 320px;
      margin: auto;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      color: green;
    }

    button {
      padding: 10px 15px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>
<h3 id="modeLabel">Mode: IN</h3>

<button onclick="setMode('IN')">Time In</button>
<button onclick="setMode('OUT')">Time Out</button>

<br><br>

<h2>QR Attendance Scanner</h2>

<button onclick="startScanner()">Start Scanner</button>
<button onclick="stopScanner()">Stop Scanner</button>

<div id="reader"></div>

<div id="result">Waiting for scan...</div>

<script>
const beep = new Audio("https://actions.google.com/sounds/v1/alarms/beep_short.ogg");
let html5QrCode;
let mode = "IN";
let scanLock = false;

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4j_4jYNPX0pdeTgxeEgVfi4Ph8ULjwynMNApyQdKG3OryHm8l3jjYR3EP4vnLisyW2w/exec";

function setMode(newMode) {
  mode = newMode;

  document.getElementById("modeLabel").innerText =
    "Mode: " + mode;
}

function startScanner() {
  html5QrCode = new Html5Qrcode("reader");

  html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
(decodedText) => {

  if (scanLock) return;

  scanLock = true;

  let now = new Date().toLocaleString();

  document.getElementById("result").innerHTML =
    "Scanned: " + decodedText + "<br>" + mode + "<br>" + now;

  // 🔊 beep sound
  beep.play();

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify({
      qr: decodedText,
      time: now,
      mode: mode
    })
  })
   .then(res => res.text())
.then(response => {

  document.getElementById("result").innerHTML =
    "Server Response: " + response;

  console.log(response);

  scanLock = false;
})

}
  ).catch(err => {
    alert("Camera error: " + err);
  });
}

function stopScanner() {
  if (html5QrCode) {
    html5QrCode.stop().then(() => html5QrCode.clear());
  }
}
</script>

</body>
</html>
